name: build and test

on:
  push:
    tags: ['v*']
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  
jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Installing Dependencies
        run: npm ci

  unit-testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Installing Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Unit Tests
        run: npm run test:unit
        working-directory: ./backend
 
  sast:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
    
  sca:
    runs-on: ubuntu-latest

    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Audit Packages
        run: npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    needs: [lint, sca, sast, unit-testing]

    steps:
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
          load: true
          cache-to: type=gha,mode=max
          cache-from: type=gha

      - run: docker images

      - name: Tag docker image with github tags
        if: startsWith(github.ref, 'refs/tags/')
        run: docker image tag ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }}

      - name: Scanning docker image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pushing the docker image to docker registery
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

      - name: Pushing semver tagged image
        if: startsWith(github.ref, 'refs/tags')
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }}

