name: build and test

on:
  push:
    tags: ['v*']
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: cache node_mojdules
        uses: actions/cache@v4
        id: cache
        with:
          path: ./backend/node_modules
          key: node-modules-${{ hashFiles('./backend/package-lock.json') }}

      - name: install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
        working-directory: ./backend


  secrets-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Scans for secret leaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    needs: [install] 
    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          key: node-modules-${{ hashFiles('./backend/package-lock.json') }}
          path: ./backend/node_modules

      - name: Lint
        run: npm run lint
        working-directory: ./backend

  unit-testing:
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Installing Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run Unit Tests
        run: npm run test:unit
        working-directory: ./backend
 
  sast:
    runs-on: ubuntu-latest
    
    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
    
  sca:
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - name: checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Installing Dependencies
        run: npm ci
        working-directory: ./backend
      
      - name: Audit Packages
        run: npm audit --audit-level=high
        working-directory: ./backend
  
  build:
    runs-on: ubuntu-latest
    needs: [lint, sca, sast, unit-testing, secrets-scanning]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
          load: true
          cache-to: type=gha,mode=max
          cache-from: type=gha

      - name: Tag docker image with github tags
        if: startsWith(github.ref, 'refs/tags/')
        run: docker image tag ${{ secrets.REGISTERY }}/${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }}

      - name: Scanning docker image for vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pushing the docker image to docker registery
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

      - name: Pushing semver tagged image
        if: startsWith(github.ref, 'refs/tags')
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.ref_name }}
  
  integration-testing:
    runs-on: ubuntu-latest
    name: "Integration Testing"
    needs: [build]
    container: thehetsolanki/backend:${{ github.sha }}
    env:
      TEST_DB_HOST: ${{ secrets.TEST_DB_HOST }}
      TEST_DB_PORT: ${{ secrets.TEST_DB_PORT }}
      TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      TEST_DB_DATABASE: ${{ secrets.TEST_DB_DATABASE }}
      TEST_MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}
      TEST_MYSQL_USER: ${{ secrets.TEST_DB_USERNAME }}
      TEST_MYSQL_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      TEST_MYSQL_DATABASE: ${{ secrets.TEST_DB_DATABASE }}
      TEST_REDIS_URL: ${{ secrets.TEST_REDIS_URL }}

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.TEST_MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.TEST_MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.TEST_MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.TEST_DB_DATABASE }}
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        options:
          --health-cmd "redis-cli ping"
          --health-timeout 5s
          --health-interval 10s
          --health-retries 10

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Install mysql-client
        run: apt-get update && apt-get install -y default-mysql-client

      - name: Setup database
        run: |
          mysql -h mysql -u root -p${{ secrets.TEST_MYSQL_ROOT_PASSWORD }} ${{ secrets.TEST_DB_DATABASE }} < schema.sql
        working-directory: ./backend

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run integration test
        run: npm run test:integration
        working-directory: ./backend
